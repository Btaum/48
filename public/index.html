<!doctype html><html><head><meta charset="utf-8"><title>BOT12 Light</title><style>body{font-family:Arial;margin:20px;background:#f5f7fb;color:#0f172a}.card{background:white;border:1px solid #dbe3ef;border-radius:12px;padding:16px;margin:12px 0}button{padding:10px 14px;border-radius:8px;border:1px solid #cbd5e1;background:#0f172a;color:white;font-weight:700}pre{white-space:pre-wrap;background:#0b1020;color:#d1fae5;padding:12px;border-radius:8px}.pill{display:inline-block;padding:6px 10px;border:1px solid #cbd5e1;border-radius:999px;background:white;margin-right:8px}</style></head><body><h1>BOT12 Light Paper Bot</h1><div class="card"><span class="pill">Paper Mode Only</span><span class="pill">Limit Entries</span><span class="pill">Min Score 8</span><span class="pill">No Live Auto</span></div><div class="card"><button onclick="scan()">Scan Now</button> <button onclick="refresh()">Refresh</button> <button onclick="stop()">Emergency Stop</button></div><div class="card"><h3>Status</h3><pre id="status"></pre></div><div class="card"><h3>Logs</h3><pre id="logs"></pre></div><script>async function refresh(){document.getElementById('status').textContent=JSON.stringify(await(await fetch('/api/status')).json(),null,2);document.getElementById('logs').textContent=JSON.stringify((await(await fetch('/api/logs')).json()).slice(0,20),null,2)}async function scan(){await fetch('/api/scan',{method:'POST'});refresh()}async function stop(){await fetch('/api/emergency-stop',{method:'POST'});refresh()}refresh()</script></body></html>
